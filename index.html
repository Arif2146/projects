<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault - Password Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <h1>SecureVault</h1>
            </div>
            <div class="header-actions">
                <button id="generate-password-btn" class="btn btn-secondary">
                    <i class="fas fa-random"></i>
                    Generate Password
                </button>
                <button id="add-password-btn" class="btn btn-primary">
                    <i class="fas fa-plus"></i>
                    Add Password
                </button>
            </div>
        </header>

        <main class="main-content">
            <div class="search-section">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search passwords...">
                </div>
                <div class="filter-options">
                    <select id="category-filter">
                        <option value="">All Categories</option>
                        <option value="social">Social Media</option>
                        <option value="email">Email</option>
                        <option value="banking">Banking</option>
                        <option value="work">Work</option>
                        <option value="shopping">Shopping</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <div class="passwords-grid" id="passwords-container">
                <!-- Password cards will be dynamically inserted here -->
            </div>

            <div class="empty-state" id="empty-state">
                <i class="fas fa-lock"></i>
                <h2>No passwords saved yet</h2>
                <p>Click "Add Password" to get started with your secure vault</p>
            </div>
        </main>
    </div>

    <!-- Add/Edit Password Modal -->
    <div class="modal" id="password-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New Password</h2>
                <button class="modal-close" id="modal-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="password-form">
                <div class="form-group">
                    <label for="site-name">Website/Service Name</label>
                    <input type="text" id="site-name" required>
                </div>
                <div class="form-group">
                    <label for="username">Username/Email</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-container">
                        <input type="password" id="password" required>
                        <button type="button" class="toggle-password" id="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button type="button" class="generate-password" id="generate-password">
                            <i class="fas fa-random"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="social">Social Media</option>
                        <option value="email">Email</option>
                        <option value="banking">Banking</option>
                        <option value="work">Work</option>
                        <option value="shopping">Shopping</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="url">Website URL (optional)</label>
                    <input type="url" id="url" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label for="notes">Notes (optional)</label>
                    <textarea id="notes" rows="3" placeholder="Additional information..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Password</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Password Generator Modal -->
    <div class="modal" id="generator-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Password Generator</h2>
                <button class="modal-close" id="generator-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="generator-content">
                <div class="form-group">
                    <label for="password-length">Password Length: <span id="length-value">16</span></label>
                    <input type="range" id="password-length" min="8" max="50" value="16">
                </div>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="include-uppercase" checked>
                        <span class="checkmark"></span>
                        Include Uppercase Letters (A-Z)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="include-lowercase" checked>
                        <span class="checkmark"></span>
                        Include Lowercase Letters (a-z)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="include-numbers" checked>
                        <span class="checkmark"></span>
                        Include Numbers (0-9)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="include-symbols" checked>
                        <span class="checkmark"></span>
                        Include Symbols (!@#$%^&*)
                    </label>
                </div>
                <div class="generated-password-container">
                    <input type="text" id="generated-password" readonly>
                    <button type="button" class="btn btn-secondary" id="copy-generated">
                        <i class="fas fa-copy"></i>
                        Copy
                    </button>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="regenerate-btn">
                        <i class="fas fa-refresh"></i>
                        Generate New
                    </button>
                    <button type="button" class="btn btn-primary" id="use-generated">
                        Use This Password
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal" id="confirm-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Confirm Action</h2>
            </div>
            <div class="confirm-content">
                <p id="confirm-message">Are you sure you want to delete this password?</p>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="confirm-cancel">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirm-delete">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <div class="toast-content">
            <i class="fas fa-check-circle"></i>
            <span id="toast-message">Action completed successfully</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
